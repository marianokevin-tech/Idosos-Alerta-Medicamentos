<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>💊 Lembrete de Medicamentos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #667eea;
      padding: 20px;
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 28px;
    }

    input, button {
      font-size: 18px;
      padding: 15px;
      margin: 10px;
      width: 90%;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #27ae60;
      color: white;
      font-weight: bold;
    }

    .card {
      background: white;
      color: black;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>💊 Lembrete de Remédios</h1>

<input id="remedio" placeholder="Nome do remédio">
<input id="horario" type="time">

<button onclick="adicionar()">Adicionar</button>

<div id="lista"></div>

<script>
let lista = JSON.parse(localStorage.getItem("remedios")) || [];

function salvar() {
  localStorage.setItem("remedios", JSON.stringify(lista));
}

function adicionar() {
  const nome = document.getElementById("remedio").value;
  const hora = document.getElementById("horario").value;

  if (!nome || !hora) {
    alert("Preencha tudo!");
    return;
  }

  lista.push({ nome, hora });
  salvar();
  renderizar();
}

function remover(index) {
  lista.splice(index, 1);
  salvar();
  renderizar();
}

function renderizar() {
  const div = document.getElementById("lista");
  div.innerHTML = "";

  lista.forEach((item, i) => {
    div.innerHTML += `
      <div class="card">
        <b>${item.nome}</b><br>
        ⏰ ${item.hora}<br><br>
        <button onclick="remover(${i})">Remover</button>
      </div>
    `;
  });
}

renderizar();
</script>

</body>
</html>
