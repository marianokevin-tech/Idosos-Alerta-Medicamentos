<script>
export default {
  data() {
    return {
      remedio: "",
      horario: "",
      frequencia: "diario", // simplificado: diario, manha, noite
      lista: [],

      // Locais de saúde (simplificado)
      locais: [
        {
          nome: "UPA Boqueirão",
          endereco: "Rua Tobias de Macedo Júnior, 123 - Boqueirão, Curitiba - PR",
          telefone: "4133567890"
        },
        {
          nome: "Hospital do Trabalhador",
          endereco: "Av. República Argentina, 2346 - Água Verde, Curitiba - PR",
          telefone: "4132154321"
        },
        {
          nome: "UBS Cajuru",
          endereco: "Rua Nossa Senhora da Luz, 456 - Cajuru, Curitiba - PR",
          telefone: "4133781234"
        },
        {
          nome: "Farmácia Popular - Matriz",
          endereco: "Rua XV de Novembro, 789 - Centro, Curitiba - PR",
          telefone: "4132224567"
        },
        {
          nome: "Farmácia 24 Horas - Centro",
          endereco: "Rua Comendador Araújo, 500 - Centro, Curitiba - PR",
          telefone: "4132227799"
        }
      ],

      enderecoBusca: "",
      localizacaoUsuario: null,
      carregandoLocalizacao: false,
      erroLocalizacao: null
    }
  },

  computed: {
    locaisExibidos() {
      let resultado = [...this.locais];
      
      if (this.enderecoBusca) {
        resultado = resultado.filter(local => 
          local.endereco.toLowerCase().includes(this.enderecoBusca.toLowerCase()) ||
          local.nome.toLowerCase().includes(this.enderecoBusca.toLowerCase())
        );
      }
      
      return resultado;
    },
    
    textoFrequencia() {
      const textos = {
        diario: "Todos os dias",
        manha: "Somente de manhã",
        noite: "Somente à noite"
      };
      return textos[this.frequencia];
    }
  },

  methods: {
    formatarTelefone(telefone) {
      if (!telefone) return "";
      const tel = telefone.toString();
      if (tel.length === 10) {
        return `(${tel.slice(0,2)}) ${tel.slice(2,6)}-${tel.slice(6)}`;
      } else if (tel.length === 11) {
        return `(${tel.slice(0,2)}) ${tel.slice(2,7)}-${tel.slice(7)}`;
      }
      return telefone;
    },

    adicionar() {
      if (this.remedio && this.horario) {
        const lembrete = {
          remedio: this.remedio,
          horario: this.horario,
          frequencia: this.frequencia,
          id: Date.now(),
          dataCriacao: new Date().toLocaleDateString(),
          ativo: true
        };
        
        this.lista.push(lembrete);
        this.salvar();
        
        // Limpar formulário
        this.remedio = "";
        this.horario = "";
        this.frequencia = "diario";
        
        alert("✅ Remédio adicionado!");
      } else {
        alert("⚠️ Preencha o nome e o horário!");
      }
    },

    remover(index) {
      if (confirm("Tem certeza que deseja remover este lembrete?")) {
        this.lista.splice(index, 1);
        this.salvar();
      }
    },
    
    alternarAtivo(index) {
      this.lista[index].ativo = !this.lista[index].ativo;
      this.salvar();
    },

    salvar() {
      localStorage.setItem("medicamentos", JSON.stringify(this.lista));
    },

    abrirMapa(endereco) {
      const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(endereco)}`;
      window.open(url, '_blank');
    },

    copiarEndereco(endereco) {
      navigator.clipboard.writeText(endereco);
      alert("Endereço copiado!");
    },

    obterLocalizacao() {
      if (!navigator.geolocation) {
        this.erroLocalizacao = "Seu navegador não suporta localização";
        return;
      }

      this.carregandoLocalizacao = true;
      this.erroLocalizacao = null;

      navigator.geolocation.getCurrentPosition(
        (position) => {
          this.localizacaoUsuario = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };
          this.carregandoLocalizacao = false;
          alert("✅ Localização ativada!");
        },
        (error) => {
          this.carregandoLocalizacao = false;
          this.erroLocalizacao = "📍 Ative a localização nas configurações";
        }
      );
    },
    
    ligarEmergencia() {
      if (confirm("🚨 ATENÇÃO! Deseja ligar para o SAMU 192?")) {
        window.location.href = "tel:192";
      }
    },
    
    verificarHorarios() {
      const agora = new Date();
      const horaAtual = agora.toTimeString().slice(0,5);
      const horaNumero = parseInt(horaAtual.split(':')[0]);
      
      this.lista.forEach(item => {
        if (!item.ativo) return;
        
        const horarioItem = item.horario;
        const horaItem = parseInt(horarioItem.split(':')[0]);
        
        let deveAlertar = false;
        
        if (item.frequencia === "diario" && item.horario === horaAtual) {
          deveAlertar = true;
        } else if (item.frequencia === "manha" && horaItem < 12 && item.horario === horaAtual) {
          deveAlertar = true;
        } else if (item.frequencia === "noite" && horaItem >= 18 && item.horario === horaAtual) {
          deveAlertar = true;
        }
        
        if (deveAlertar) {
          alert(`🔔 HORA DO REMÉDIO!\n\n💊 ${item.remedio}\n⏰ ${item.horario}`);
        }
      });
    }
  },

  mounted() {
    const dados = localStorage.getItem("medicamentos");
    if (dados) {
      this.lista = JSON.parse(dados);
    }
    
    // Verificar horários a cada minuto
    setInterval(() => {
      this.verificarHorarios();
    }, 60000);
    
    // Pedir permissão para notificações
    if ("Notification" in window) {
      Notification.requestPermission();
    }
  }
}
</script>

  <div class="container">

    <p class="subtitulo">Adicione seus remédios e horários</p>

    <!-- FORMULÁRIO SIMPLES -->
    <div class="form-card">
      <h3>➕ Novo Remédio</h3>
      
      <input

      <div class="form-row">
        <div class="form-group">
          <label>⏰ Horário</label>

        <div class="form-group">
          <label>📅 Quando tomar?</label>
          <select v-model="frequencia" class="input-grande">
            <option value="diario">Todos os dias</option>
            <option value="manha">Somente de manhã</option>
            <option value="noite">Somente à noite</option>

      <button @click="adicionar" class="btn-add">✅ ADICIONAR REMÉDIO</button>

    <!-- LISTA DE REMÉDIOS -->
    <div v-if="lista.length > 0" class="lista-container">
      <h2>📋 Seus Remédios</h2>
      
      <div v-for="(item, index) in lista" :key="item.id" class="lembrete-card" :class="{ inativo: !item.ativo }">
        <div class="lembrete-info">
          <div class="lembrete-nome">💊 {{ item.remedio }}</div>
          <div class="lembrete-horario">⏰ {{ item.horario }}</div>
          <div class="lembrete-frequencia">{{ textoFrequencia }}</div>
        </div>
        
        <div class="lembrete-actions">
          <button @click="alternarAtivo(index)" class="toggle-btn" :class="{ ativo: item.ativo }">
            {{ item.ativo ? '🔔 Ativo' : '🔕 Parado' }}
          </button>
          <button class="btn-remover" @click="remover(index)">❌ Remover</button>
        </div>

    </div>
    
    <div v-else class="empty-state">
      <p>📭 Nenhum remédio cadastrado</p>
      <p>Adicione seu primeiro remédio acima</p>
    </div>

    <!-- LOCAIS DE SAÚDE -->
    <div class="locais-container">
      <h2>📍 Farmácias e Hospitais</h2>
      
      <div class="location-status">
        <button @click="obterLocalizacao" class="location-btn" :disabled="carregandoLocalizacao">

        </button>
        <p v-if="erroLocalizacao" class="error-msg">{{ erroLocalizacao }}</p>
      </div>

      <input 
        v-model="enderecoBusca" 
        placeholder="🔍 Buscar local"
        class="busca"
      >

      <div class="locais">
        <div class="card" v-for="(local, index) in locaisExibidos" :key="index">
          <h3>📍 {{ local.nome }}</h3>
          <p class="endereco">{{ local.endereco }}</p>
          
          <div class="botoes-acao">
            <button class="btn-mapa" @click="abrirMapa(local.endereco)">
              🗺️ ABRIR MAPA
            </button>
            <a :href="'tel:' + local.telefone" class="btn-ligar">
              📞 LIGAR AGORA
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTÃO DE EMERGÊNCIA (GRANDE) -->
    <button class="emergency-btn" @click="ligarEmergencia">
      🚨 EMERGÊNCIA - SAMU 192 🚨
    </button>
    
    <p class="footer-note">
      💾 Seus remédios ficam salvos no celular
    </p>
  </div>
